name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Next.js app (qudurat-next)
  # ============================================================================
  next-lint-typecheck-unit:
    name: Next — lint, type-check, unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qudurat-next
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: qudurat-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test -- --run --coverage
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: next-coverage
          path: qudurat-next/coverage/
          retention-days: 14

  next-build:
    name: Next — production build
    runs-on: ubuntu-latest
    needs: next-lint-typecheck-unit
    defaults:
      run:
        working-directory: qudurat-next
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: qudurat-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}

  # ============================================================================
  # Vite app (legacy — keep green during migration)
  # ============================================================================
  vite-lint-build:
    name: Vite — lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://test.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'test' }}
          VITE_SUPABASE_PROJECT_ID: test

  # ============================================================================
  # Supabase edge functions — syntax check
  # ============================================================================
  supabase-functions-check:
    name: Supabase edge functions — type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Type check edge functions
        run: |
          for fn in supabase/functions/*/index.ts; do
            echo "Checking $fn"
            deno check --allow-import "$fn" || exit 1
          done
