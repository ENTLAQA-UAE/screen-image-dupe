name: Security Scanning

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run weekly at 02:00 UTC on Sundays
    - cron: '0 2 * * 0'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Dependency vulnerabilities
  # ============================================================================
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev || true

  # ============================================================================
  # Static analysis via CodeQL
  # ============================================================================
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

  # ============================================================================
  # Check .env files are not committed
  # ============================================================================
  env-guard:
    name: Ensure no .env files committed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for .env files in repo
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.)(?!example)' | grep -v '.env.example'; then
            echo "::error::Found tracked .env files. Remove them and add to .gitignore."
            exit 1
          fi
          echo "OK: no .env files tracked"
