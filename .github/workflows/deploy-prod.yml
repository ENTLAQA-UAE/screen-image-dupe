name: Deploy Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type PRODUCTION to confirm'
        required: true

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify inputs
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "PRODUCTION" ]; then
            echo "Confirmation text does not match. Aborting."
            exit 1
          fi

  deploy:
    name: Deploy to Vercel production
    runs-on: ubuntu-latest
    needs: [verify]
    if: ${{ always() && (github.event_name == 'push' || needs.verify.result == 'success') }}
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: qudurat-next

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: qudurat-next

      - name: Deploy to production
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "Deployed to production: $url"
        working-directory: qudurat-next

      - name: Create GitHub deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment?.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Production deployment',
            }).catch(() => {});
